name: ESPHome Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ESPHome firmware
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware
        uses: esphome/build-action@v7
        with:
          yaml-file: ir_pult.yaml

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ir-pult-firmware
          path: |
            .esphome/build/ir-pult/.pioenvs/ir-pult/firmware.bin
